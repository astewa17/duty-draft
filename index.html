  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

--on-panel:#1B1714;\n    --line:#E7DED2; --line-strong:#1B1714;\n    --muted:#847A6E; --muted-on-field:#847A6E;\n    --secondary:#E8571C; --on-secondary:#FFFFFF;      /* orange brand */\n    --accent:#1B1714; --on-accent:#FBF7F2;             /* black structure */\n    --highlight:#E8571C; --on-highlight:#FFFFFF;       /* attention pops */\n    --brand:#E8571C; --accent-text:#1B1714;\n    --texture:none; --shadow:rgba(27,23,20,.13); --shadow-2:rgba(27,23,20,.20);\n    --mascot:tiger;\n  }\n  :root[data-theme=\"duck\"] {\n    --field:#F6F7F1; --on-field:#19241C;\n    --panel:#FFFFFF; --panel-2:#EDF1E8; --on-panel:#19241C;\n    --line:rgba(25,36,28,.16); --line-strong:#19241C;\n    --muted:rgba(25,36,28,.6); --muted-on-field:rgba(25,36,28,.66);\n    --secondary:#1C7A43; --on-secondary:#FFFFFF;       /* green brand */\n    --accent:#5A3D22; --on-accent:#FBF3DF;             /* leather-brown structure */\n    --highlight:#F4C20A; --on-highlight:#221A02;       /* bright yellow */\n    --brand:#1C7A43; --accent-text:#1C7A43;\n    /* pebbled rugby-leather grain layered over the brown structure */\n    --texture:radial-gradient(circle at 50% 50%, rgba(0,0,0,.22) 0 1.1px, transparent 1.6px),\n              radial-gradient(circle at 50% 50%, rgba(255,236,190,.10) 0 1px, transparent 1.5px);\n    --shadow:rgba(28,52,30,.16); --shadow-2:rgba(28,52,30,.26);\n    --mascot:duck;\n  }\n  :root[data-theme=\"dark\"] {\n    --field:#15120E; --on-field:#F3EEE7;\n    --panel:#221C16; --panel-2:#2C261E; --on-panel:#F3EEE7;\n    --line:rgba(243,238,231,.13); --line-strong:rgba(243,238,231,.5);\n    --muted:#9C9286; --muted-on-field:rgba(243,238,231,.55);\n    --secondary:#F3EEE7; --on-secondary:#15120E;       /* white brand */\n    --accent:var(--tw-accent,#4D28BD); --on-accent:#FFFFFF;\n    --highlight:var(--tw-accent,#4D28BD); --on-highlight:#FFFFFF;\n    --brand:#C9601F; --accent-text:#A88CF5;\n    --texture:none; --shadow:rgba(0,0,0,.5); --shadow-2:rgba(0,0,0,.7);\n    --mascot:tiger;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; height: 100%; }\n  body {\n    font-family: \"Hanken Grotesk\", system-ui, sans-serif;\n    background: var(--field); color: var(--on-field);\n    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;\n    overflow: hidden;\n  }\n  #root { height: 100vh; }\n  .mono { font-family: \"JetBrains Mono\", ui-monospace, monospace; }\n  .cond { font-family: \"Saira Condensed\", sans-serif; }\n  button { font-family: inherit; }\n\n  /* ---- depth & broadcast utilities ---- */\n  .feature-bar {\n    background-color: var(--accent); color: var(--on-accent);\n    background-image: var(--texture); background-size: 6px 6px, 6px 6px;\n    background-position: 0 0, 3px 3px;\n  }\n  .card    { background: var(--panel); color: var(--on-panel); border: 1px solid var(--line);\n             box-shadow: 0 1px 2px var(--shadow), 0 6px 18px color-mix(in srgb, var(--shadow) 55%, transparent); }\n  .lift    { transition: transform .14s cubic-bezier(.2,.7,.3,1), box-shadow .14s; }\n  .lift:hover { transform: translateY(-3px); box-shadow: 0 10px 26px var(--shadow-2), 0 2px 6px var(--shadow); }\n  .glow    { box-shadow: 0 0 0 2px var(--highlight), 0 0 22px color-mix(in srgb, var(--highlight) 55%, transparent); }\n  .inset   { box-shadow: inset 0 1px 0 rgba(255,255,255,.10), inset 0 -2px 6px rgba(0,0,0,.18); }\n\n  @keyframes clockPulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.04); } }\n  @keyframes onclock    { 0%,100%{ box-shadow: 0 0 0 0 color-mix(in srgb, var(--highlight) 60%, transparent); }\n                          50%{ box-shadow: 0 0 0 7px transparent; } }\n  @keyframes stingerIn  { 0%{ transform: translateY(20px) scale(.97); }\n                          60%{ transform: translateY(-3px) scale(1.01); }\n                          100%{ transform: translateY(0) scale(1); } }\n  @keyframes tickerScroll { from{ transform: translateX(0);} to{ transform: translateX(-50%);} }\n  @keyframes spin3d { to { transform: rotateX(1800deg); } }\n  @keyframes pop { 0%{transform:scale(.8);opacity:0} 60%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }\n  @keyframes coinShadow { 0%,100%{ transform: scale(1); opacity:.22 } 50%{ transform: scale(.5); opacity:.08 } }\n  @keyframes coinToss { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-240px); } }\n  @keyframes coinFlip {\n    0%{transform:perspective(700px) scaleY(1) translateY(0)}\n    12%{transform:perspective(700px) scaleY(.08) translateY(-26px)}\n    25%{transform:perspective(700px) scaleY(1) translateY(0)}\n    37%{transform:perspective(700px) scaleY(.08) translateY(-22px)}\n    50%{transform:perspective(700px) scaleY(1) translateY(0)}\n    63%{transform:perspective(700px) scaleY(.08) translateY(-16px)}\n    76%{transform:perspective(700px) scaleY(1) translateY(0)}\n    88%{transform:perspective(700px) scaleY(.1) translateY(-8px)}\n    100%{transform:perspective(700px) scaleY(1) translateY(0)}\n  }\n  .stinger { animation: stingerIn .42s cubic-bezier(.2,.8,.2,1); }\n\n  /* scrollbars hidden but scrollable */\n  .scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--line) transparent; }\n  .scroll::-webkit-scrollbar { width: 8px; }\n  .scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }\n\n  image-slot { --is-bg: var(--panel-2); }\n\n  /* print: only the export sheet (portaled to <body>, outside #root) */\n  @media print {\n    html, body { overflow: visible !important; height: auto !important; background: #fff !important; }\n    #root { display: none !important; }\n    .tweaks-host, .no-print { display: none !important; }\n    #print-area { display: block !important; }\n  }\n  #print-area { display: none; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"root\"><\u002Fdiv>\n\n<script src=\"7c6acf5d-b422-40aa-8aca-563f28a05dea\" crossorigin=\"anonymous\"><\u002Fscript>\n<script src=\"2733889a-075f-41c3-96db-626a20dc29f2\" c
