<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SBA · The Duty Draft '26 — War Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Saira+Condensed:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     THEME TOKENS
       Light   = TIGER · White field · Orange brand · Black structure
       Duck    = DUCK  · White field · Green brand · Leather structure · Yellow pops
       Dark    = TIGER · Black field · White type · Indigo accents
     ============================================================ */
  :root[data-theme="light"] {
    --field:#FBF7F2; --on-field:#1B1714;
    --panel:#FFFFFF; --panel-2:#F4EEE6; --on-panel:#1B1714;
    --line:#E7DED2; --line-strong:#1B1714;
    --muted:#847A6E; --muted-on-field:#847A6E;
    --secondary:#E8571C; --on-secondary:#FFFFFF;      /* orange brand */
    --accent:#1B1714; --on-accent:#FBF7F2;             /* black structure */
    --highlight:#E8571C; --on-highlight:#FFFFFF;       /* attention pops */
    --brand:#E8571C; --accent-text:#1B1714;
    --texture:none; --shadow:rgba(27,23,20,.13); --shadow-2:rgba(27,23,20,.20);
    --mascot:tiger;
  }
  :root[data-theme="duck"] {
    --field:#F6F7F1; --on-field:#19241C;
    --panel:#FFFFFF; --panel-2:#EDF1E8; --on-panel:#19241C;
    --line:rgba(25,36,28,.16); --line-strong:#19241C;
    --muted:rgba(25,36,28,.6); --muted-on-field:rgba(25,36,28,.66);
    --secondary:#1C7A43; --on-secondary:#FFFFFF;       /* green brand */
    --accent:#5A3D22; --on-accent:#FBF3DF;             /* leather-brown structure */
    --highlight:#F4C20A; --on-highlight:#221A02;       /* bright yellow */
    --brand:#1C7A43; --accent-text:#1C7A43;
    /* pebbled rugby-leather grain layered over the brown structure */
    --texture:radial-gradient(circle at 50% 50%, rgba(0,0,0,.22) 0 1.1px, transparent 1.6px),
              radial-gradient(circle at 50% 50%, rgba(255,236,190,.10) 0 1px, transparent 1.5px);
    --shadow:rgba(28,52,30,.16); --shadow-2:rgba(28,52,30,.26);
    --mascot:duck;
  }
  :root[data-theme="dark"] {
    --field:#15120E; --on-field:#F3EEE7;
    --panel:#221C16; --panel-2:#2C261E; --on-panel:#F3EEE7;
    --line:rgba(243,238,231,.13); --line-strong:rgba(243,238,231,.5);
    --muted:#9C9286; --muted-on-field:rgba(243,238,231,.55);
    --secondary:#F3EEE7; --on-secondary:#15120E;       /* white brand */
    --accent:var(--tw-accent,#4D28BD); --on-accent:#FFFFFF;
    --highlight:var(--tw-accent,#4D28BD); --on-highlight:#FFFFFF;
    --brand:#C9601F; --accent-text:#A88CF5;
    --texture:none; --shadow:rgba(0,0,0,.5); --shadow-2:rgba(0,0,0,.7);
    --mascot:tiger;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Hanken Grotesk", system-ui, sans-serif;
    background: var(--field); color: var(--on-field);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  #root { height: 100vh; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  .cond { font-family: "Saira Condensed", sans-serif; }
  button { font-family: inherit; }

  /* ---- depth & broadcast utilities ---- */
  .feature-bar {
    background-color: var(--accent); color: var(--on-accent);
    background-image: var(--texture); background-size: 6px 6px, 6px 6px;
    background-position: 0 0, 3px 3px;
  }
  .card    { background: var(--panel); color: var(--on-panel); border: 1px solid var(--line);
             box-shadow: 0 1px 2px var(--shadow), 0 6px 18px color-mix(in srgb, var(--shadow) 55%, transparent); }
  .lift    { transition: transform .14s cubic-bezier(.2,.7,.3,1), box-shadow .14s; }
  .lift:hover { transform: translateY(-3px); box-shadow: 0 10px 26px var(--shadow-2), 0 2px 6px var(--shadow); }
  .glow    { box-shadow: 0 0 0 2px var(--highlight), 0 0 22px color-mix(in srgb, var(--highlight) 55%, transparent); }
  .inset   { box-shadow: inset 0 1px 0 rgba(255,255,255,.10), inset 0 -2px 6px rgba(0,0,0,.18); }

  @keyframes clockPulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.04); } }
  @keyframes onclock    { 0%,100%{ box-shadow: 0 0 0 0 color-mix(in srgb, var(--highlight) 60%, transparent); }
                          50%{ box-shadow: 0 0 0 7px transparent; } }
  @keyframes stingerIn  { 0%{ transform: translateY(20px) scale(.97); }
                          60%{ transform: translateY(-3px) scale(1.01); }
                          100%{ transform: translateY(0) scale(1); } }
  @keyframes tickerScroll { from{ transform: translateX(0);} to{ transform: translateX(-50%);} }
  @keyframes spin3d { to { transform: rotateX(1800deg); } }
  @keyframes pop { 0%{transform:scale(.8);opacity:0} 60%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
  @keyframes coinShadow { 0%,100%{ transform: scale(1); opacity:.22 } 50%{ transform: scale(.5); opacity:.08 } }
  @keyframes coinToss { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-240px); } }
  @keyframes coinFlip {
    0%{transform:perspective(700px) scaleY(1) translateY(0)}
    12%{transform:perspective(700px) scaleY(.08) translateY(-26px)}
    25%{transform:perspective(700px) scaleY(1) translateY(0)}
    37%{transform:perspective(700px) scaleY(.08) translateY(-22px)}
    50%{transform:perspective(700px) scaleY(1) translateY(0)}
    63%{transform:perspective(700px) scaleY(.08) translateY(-16px)}
    76%{transform:perspective(700px) scaleY(1) translateY(0)}
    88%{transform:perspective(700px) scaleY(.1) translateY(-8px)}
    100%{transform:perspective(700px) scaleY(1) translateY(0)}
  }
  .stinger { animation: stingerIn .42s cubic-bezier(.2,.8,.2,1); }

  /* scrollbars hidden but scrollable */
  .scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .scroll::-webkit-scrollbar { width: 8px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }

  image-slot { --is-bg: var(--panel-2); }

  /* print: only the export sheet (portaled to <body>, outside #root) */
  @media print {
    html, body { overflow: visible !important; height: auto !important; background: #fff !important; }
    #root { display: none !important; }
    .tweaks-host, .no-print { display: none !important; }
    #print-area { display: block !important; }
  }
  #print-area { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
